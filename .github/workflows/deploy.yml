name: Employee API CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore EmployeeApi/EmployeeApi.csproj

      - name: Build application
        run: dotnet build EmployeeApi/EmployeeApi.csproj --no-restore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t employeeapi ./EmployeeApi

      - name: Tag Docker image
        run: |
          docker tag employeeapi:latest 106083617983.dkr.ecr.ap-south-1.amazonaws.com/employeeapi:latest

      - name: Push Docker image
        run: |
          docker push 106083617983.dkr.ecr.ap-south-1.amazonaws.com/employeeapi:latest

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster employeeapi-cluster \
            --service employeeapi-service \
            --force-new-deployment